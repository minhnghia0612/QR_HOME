services:
  backend:
    build:
      context: ./BE
      dockerfile: Dockerfile
    container_name: qr_home_api
    env_file:
      - .env
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: 5432
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_DATABASE: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 24h
      PORT: 3001
      NODE_ENV: ${NODE_ENV:-production}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio}
      MINIO_PORT: ${MINIO_PORT:-9002}
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-qrhome}
    ports:
      - "3001:3001"
    networks:
      - dokploy-network
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped

  frontend:
    build:
      context: ./FE
      dockerfile: Dockerfile
    container_name: qr_home_web
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - dokploy-network
    restart: unless-stopped

volumes:
  uploads:

networks:
  dokploy-network:
    external: true
