services:
  postgres:
    image: postgres:16-alpine
    container_name: qr_home_db
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - qr_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./BE
      dockerfile: Dockerfile
    container_name: qr_home_api
    env_file:
      - .env
      - ./BE/.env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_DATABASE: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 24h
      PORT: 3000
      NODE_ENV: ${NODE_ENV:-production}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      MINIO_ENDPOINT: minio
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - qr_network
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped

  frontend:
    build:
      context: ./FE
      dockerfile: Dockerfile
      args:
        VITE_GOOGLE_AUTH_URL: ${VITE_GOOGLE_AUTH_URL:-/api/auth/google}
    container_name: qr_home_web
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - qr_network
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: qr_home_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    networks:
      - qr_network
    volumes:
      - minio_data:/data
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
  minio_data:

networks:
  qr_network:
    driver: bridge
