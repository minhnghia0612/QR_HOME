services:
  backend:
    build:
      context: ./BE
      dockerfile: Dockerfile
    container_name: qr_home_api
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_DATABASE: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 24h
      PORT: 3000
      NODE_ENV: ${NODE_ENV:-production}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      MINIO_ENDPOINT: minio
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - qr_network
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped

  frontend:
    build:
      context: ./FE
      dockerfile: Dockerfile
    container_name: qr_home_web
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - qr_network
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
  minio_data:

networks:
  qr_network:
    driver: bridge
